name: Update APK Size Badge

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch || 'main' }}

      - name: Generate APK size badge payload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest"
          APK_SIZE_BYTES="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API_URL}" | jq -r '.assets[] | select(.name == "app-release.apk") | .size' | head -n 1)"

          BADGE_COLOR="2ea44f"
          BADGE_MESSAGE="not available"

          if [ -n "${APK_SIZE_BYTES}" ] && [ "${APK_SIZE_BYTES}" != "null" ]; then
            BADGE_MESSAGE="$(awk "BEGIN {printf \"%.1f MB\", ${APK_SIZE_BYTES}/1024/1024}")"
          else
            BADGE_COLOR="d73a49"
          fi

          cat > docs/readme/apk-size-badge.json <<EOF
          {
            "schemaVersion": 1,
            "label": "APK size",
            "message": "${BADGE_MESSAGE}",
            "color": "${BADGE_COLOR}"
          }
          EOF

      - name: Commit badge update
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- docs/readme/apk-size-badge.json; then
            echo "No badge update required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/readme/apk-size-badge.json
          git commit -m "chore: update APK size badge"
          git push
