name: Android Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.1.0'
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 36 SDK packages
        shell: bash
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"
      
      - name: Build release APK
        run: |
          set -euo pipefail
          gradle :app:assembleRelease --no-daemon --stacktrace 2>&1 | tee build-assembleRelease.log

      - name: Upload assembleRelease log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-assembleRelease-log
          path: build-assembleRelease.log
          retention-days: 5
      
      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p dist

          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk dist/app-release.apk
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk dist/app-release.apk
          else
            echo "Release APK not found"
            exit 1
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            dist/app-release.apk
          generate_release_notes: true


