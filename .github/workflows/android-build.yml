name: Android Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          cache-read-only: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Build debug APK
        env:
          JAVA_OPTS: -Djava.awt.headless=true -Dksp.incremental.log=false
          ORG_GRADLE_PROJECT_org_gradle_jvmargs: -Xmx4g -Dfile.encoding=UTF-8 -Djava.awt.headless=true
        run: |
          set -euo pipefail
          export JAVA_OPTS="-Xmx4g -Dfile.encoding=UTF-8 -Djava.awt.headless=true -Dksp.incremental.log=false"
          gradle :app:assembleDebug -Djava.awt.headless=true --no-daemon --stacktrace 2>&1 | tee build-debug.log
          if [ ! -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "ERROR: Debug APK build failed"
            exit 1
          fi
          echo "✓ Debug APK built successfully"

      - name: Build test APK
        env:
          JAVA_OPTS: -Djava.awt.headless=true -Dksp.incremental.log=false
          ORG_GRADLE_PROJECT_org_gradle_jvmargs: -Xmx4g -Dfile.encoding=UTF-8 -Djava.awt.headless=true
        run: |
          set -euo pipefail
          export JAVA_OPTS="-Xmx4g -Dfile.encoding=UTF-8 -Djava.awt.headless=true -Dksp.incremental.log=false"
          gradle :app:assembleDebugAndroidTest -Djava.awt.headless=true --no-daemon --stacktrace 2>&1 | tee build-test.log
          if [ ! -f "app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk" ]; then
            echo "ERROR: Test APK build failed"
            exit 1
          fi
          echo "✓ Test APK built successfully"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-apks
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
          retention-days: 5

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build-*.log
          retention-days: 5

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          cache-read-only: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Run lint checks
        run: |
          set -euo pipefail
          gradle :app:lint --no-daemon --stacktrace 2>&1 | tee lint.log
          echo "✓ Lint checks completed"

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results*.html
          retention-days: 5

      - name: Upload lint log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-log
          path: lint.log
          retention-days: 5

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          cache-read-only: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Run unit tests
        run: |
          set -euo pipefail
          gradle :app:test --no-daemon --stacktrace 2>&1 | tee test.log
          echo "✓ Unit tests completed"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 5

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log
          retention-days: 5
