name: Android Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.1.0'
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Build debug APK
        run: gradle :app:assembleDebug
      
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
      
      - name: Build debug test APK
        run: gradle :app:assembleDebugAndroidTest
      
      - name: Upload debug test APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-test-apk
          path: app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
          retention-days: 5

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.1.0'
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Run lint checks
        run: gradle :app:lint
      
      - name: Upload lint results
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results*.html
          retention-days: 5
        if: always()

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.1.0'
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Run unit tests
        run: gradle :app:test
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 5
        if: always()


