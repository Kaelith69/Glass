<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">CineCommon architecture diagram</title>
  <desc id="desc">Single-activity Compose architecture with ViewModel, repository, and Room persistence.</desc>
  <defs>
    <style>
      .bg { fill: #0b0b0d; }
      .panel { fill: #17171b; stroke: rgba(255,255,255,.08); stroke-width: 1.5; }
      .box { fill: #222228; stroke: rgba(255,255,255,.10); stroke-width: 1.25; }
      .title { fill: #f4f4f5; font: 700 22px Inter, Segoe UI, Arial, sans-serif; }
      .text { fill: #a1a1aa; font: 500 15px Inter, Segoe UI, Arial, sans-serif; }
      .small { fill: #a1a1aa; font: 500 13px Inter, Segoe UI, Arial, sans-serif; }
      .accent { fill: #ef4444; }
      .gold { fill: #fbbf24; }
      .line { stroke: #f4f4f5; stroke-opacity: .28; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f4f4f5" opacity=".9"/>
    </marker>
  </defs>
  <rect width="1600" height="820" class="bg"/>
  <rect x="56" y="42" width="1488" height="736" rx="28" class="panel"/>
  <text x="92" y="92" class="title">Architecture</text>
  <text x="92" y="120" class="text">One activity, one ViewModel, one repository, one Room database.</text>

  <g transform="translate(92 168)">
    <rect width="278" height="156" rx="20" class="box"/>
    <circle cx="42" cy="42" r="16" class="accent"/>
    <text x="72" y="39" class="title" font-size="18">MainActivity</text>
    <text x="24" y="80" class="small">Hosts the Compose tree</text>
    <text x="24" y="106" class="small">Applies the app theme</text>
  </g>

  <g transform="translate(426 168)">
    <rect width="278" height="156" rx="20" class="box"/>
    <circle cx="42" cy="42" r="16" class="gold"/>
    <text x="72" y="39" class="title" font-size="18">CineCommonApp</text>
    <text x="24" y="80" class="small">Routes screens</text>
    <text x="24" y="106" class="small">Manages sheets and navigation</text>
  </g>

  <g transform="translate(760 168)">
    <rect width="278" height="156" rx="20" class="box"/>
    <circle cx="42" cy="42" r="16" class="accent"/>
    <text x="72" y="39" class="title" font-size="18">MainViewModel</text>
    <text x="24" y="80" class="small">Owns StateFlow state</text>
    <text x="24" y="106" class="small">Handles UI actions</text>
  </g>

  <g transform="translate(1094 168)">
    <rect width="278" height="156" rx="20" class="box"/>
    <circle cx="42" cy="42" r="16" class="gold"/>
    <text x="72" y="39" class="title" font-size="18">AppRepository</text>
    <text x="24" y="80" class="small">Applies business rules</text>
    <text x="24" y="106" class="small">Reads and writes Room</text>
  </g>

  <path d="M370 246 H426" class="line"/>
  <path d="M704 246 H760" class="line"/>
  <path d="M1038 246 H1094" class="line"/>

  <rect x="92" y="388" width="1280" height="284" rx="24" class="box"/>
  <text x="122" y="432" class="title" font-size="18">Room database</text>
  <text x="122" y="460" class="text">Local persistence for users, movies, reviews, lists, badges, notifications, and edit history.</text>

  <g transform="translate(122 500)">
    <rect width="170" height="104" rx="18" class="panel"/>
    <text x="18" y="32" class="title" font-size="17">Users</text>
    <text x="18" y="60" class="small">profile, trust, badges</text>
  </g>
  <g transform="translate(312 500)">
    <rect width="170" height="104" rx="18" class="panel"/>
    <text x="18" y="32" class="title" font-size="17">Movies</text>
    <text x="18" y="60" class="small">metadata, tags, stats</text>
  </g>
  <g transform="translate(502 500)">
    <rect width="170" height="104" rx="18" class="panel"/>
    <text x="18" y="32" class="title" font-size="17">Reviews</text>
    <text x="18" y="60" class="small">ratings, spoilers, likes</text>
  </g>
  <g transform="translate(692 500)">
    <rect width="170" height="104" rx="18" class="panel"/>
    <text x="18" y="32" class="title" font-size="17">Lists</text>
    <text x="18" y="60" class="small">watchlist, wishlist, custom</text>
  </g>
  <g transform="translate(882 500)">
    <rect width="170" height="104" rx="18" class="panel"/>
    <text x="18" y="32" class="title" font-size="17">Badges</text>
    <text x="18" y="60" class="small">unlock state and pinning</text>
  </g>
  <g transform="translate(1072 500)">
    <rect width="170" height="104" rx="18" class="panel"/>
    <text x="18" y="32" class="title" font-size="17">History</text>
    <text x="18" y="60" class="small">pending edits, rollbacks</text>
  </g>
  <g transform="translate(1262 500)">
    <rect width="110" height="104" rx="18" class="panel"/>
    <text x="18" y="32" class="title" font-size="17">Flow</text>
    <text x="18" y="60" class="small">reactive</text>
  </g>
</svg>
