<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">CineCommon data flow diagram</title>
  <desc id="desc">UI events move through the ViewModel into the repository and back through StateFlow.</desc>
  <defs>
    <style>
      .bg { fill: #0b0b0d; }
      .panel { fill: #17171b; stroke: rgba(255,255,255,.08); stroke-width: 1.5; }
      .box { fill: #222228; stroke: rgba(255,255,255,.10); stroke-width: 1.25; }
      .title { fill: #f4f4f5; font: 700 22px Inter, Segoe UI, Arial, sans-serif; }
      .text { fill: #a1a1aa; font: 500 15px Inter, Segoe UI, Arial, sans-serif; }
      .small { fill: #a1a1aa; font: 500 13px Inter, Segoe UI, Arial, sans-serif; }
      .accent { fill: #ef4444; }
      .gold { fill: #fbbf24; }
      .line { stroke: #f4f4f5; stroke-opacity: .28; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .line2 { stroke: #fbbf24; stroke-opacity: .6; stroke-width: 3; fill: none; marker-end: url(#arrowGold); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f4f4f5" opacity=".9"/>
    </marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fbbf24" opacity=".9"/>
    </marker>
  </defs>
  <rect width="1600" height="820" class="bg"/>
  <rect x="56" y="42" width="1488" height="736" rx="28" class="panel"/>
  <text x="92" y="92" class="title">Data flow</text>
  <text x="92" y="120" class="text">UI events move through the ViewModel, then through the repository, then back as reactive state.</text>

  <g transform="translate(92 180)">
    <rect width="220" height="120" rx="20" class="box"/>
    <text x="24" y="42" class="title" font-size="18">UI</text>
    <text x="24" y="70" class="small">Search, review, toggle</text>
    <text x="24" y="94" class="small">Onboarding and details</text>
  </g>

  <g transform="translate(372 180)">
    <rect width="240" height="120" rx="20" class="box"/>
    <circle cx="36" cy="42" r="14" class="accent"/>
    <text x="64" y="42" class="title" font-size="18">ViewModel</text>
    <text x="24" y="70" class="small">Owns state and actions</text>
    <text x="24" y="94" class="small">Exposes StateFlow</text>
  </g>

  <g transform="translate(672 180)">
    <rect width="240" height="120" rx="20" class="box"/>
    <circle cx="36" cy="42" r="14" class="gold"/>
    <text x="64" y="42" class="title" font-size="18">Repository</text>
    <text x="24" y="70" class="small">Validates business rules</text>
    <text x="24" y="94" class="small">Writes to Room</text>
  </g>

  <g transform="translate(972 180)">
    <rect width="260" height="120" rx="20" class="box"/>
    <text x="24" y="42" class="title" font-size="18">Room</text>
    <text x="24" y="70" class="small">Users, movies, reviews, lists</text>
    <text x="24" y="94" class="small">Badges, notifications, history</text>
  </g>

  <path d="M312 240 H372" class="line"/>
  <path d="M612 240 H672" class="line"/>
  <path d="M912 240 H972" class="line"/>

  <g transform="translate(672 360)">
    <rect width="560" height="144" rx="22" class="box"/>
    <text x="24" y="40" class="title" font-size="18">Reactive output</text>
    <text x="24" y="70" class="small">Room changes flow back into the UI through StateFlow.</text>
    <text x="24" y="96" class="small">Compose recomposes without polling or manual refresh logic.</text>
  </g>
  <path d="M1092 300 V360" class="line2"/>
  <path d="M672 432 H612" class="line2"/>

  <g transform="translate(92 360)">
    <rect width="500" height="220" rx="22" class="box"/>
    <text x="24" y="42" class="title" font-size="18">Runtime rules</text>
    <text x="24" y="78" class="small">• usernames are unique and reserved words are blocked</text>
    <text x="24" y="108" class="small">• reviews are capped at 2,000 characters</text>
    <text x="24" y="138" class="small">• badges can be pinned up to 6 at a time</text>
    <text x="24" y="168" class="small">• trust score 70+ fast-tracks edits</text>
    <text x="24" y="198" class="small">• rollback is gated to senior editors</text>
  </g>
</svg>
