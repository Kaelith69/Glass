<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">CineCommon folder structure diagram</title>
  <desc id="desc">A compact tree of the repository's relevant folders and files.</desc>
  <defs>
    <style>
      .bg { fill: #0c0c0e; }
      .panel { fill: #1a1a1d; stroke: rgba(255,255,255,.08); stroke-width: 1.5; }
      .title { fill: #fafafa; font: 700 20px Inter, Segoe UI, Arial, sans-serif; }
      .text { fill: #a1a1aa; font: 500 15px Inter, Segoe UI, Arial, sans-serif; }
      .path { fill: #e5e7eb; font: 600 15px SFMono-Regular, Consolas, monospace; }
      .muted { fill: #a1a1aa; font: 500 13px Inter, Segoe UI, Arial, sans-serif; }
      .accent { fill: #e53935; }
      .gold { fill: #fbbf24; }
      .line { stroke: rgba(255,255,255,.22); stroke-width: 2; fill: none; }
    </style>
  </defs>
  <rect width="1600" height="900" class="bg"/>
  <rect x="56" y="42" width="1488" height="816" rx="28" class="panel"/>
  <text x="88" y="92" class="title">Folder structure</text>
  <text x="88" y="120" class="text">Only the important bits. The rest is standard Android furniture.</text>

