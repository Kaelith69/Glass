<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">CineCommon folder structure diagram</title>
  <desc id="desc">A compact view of the main repository folders and files.</desc>
  <defs>
    <style>
      .bg { fill: #0b0b0d; }
      .panel { fill: #17171b; stroke: rgba(255,255,255,.08); stroke-width: 1.5; }
      .title { fill: #f4f4f5; font: 700 22px Inter, Segoe UI, Arial, sans-serif; }
      .text { fill: #a1a1aa; font: 500 15px Inter, Segoe UI, Arial, sans-serif; }
      .path { fill: #e5e7eb; font: 600 15px SFMono-Regular, Consolas, monospace; }
      .muted { fill: #a1a1aa; font: 500 13px Inter, Segoe UI, Arial, sans-serif; }
      .accent { fill: #ef4444; }
      .gold { fill: #fbbf24; }
      .line { stroke: rgba(255,255,255,.20); stroke-width: 2; fill: none; }
    </style>
  </defs>
  <rect width="1600" height="820" class="bg"/>
  <rect x="56" y="42" width="1488" height="736" rx="28" class="panel"/>
  <text x="92" y="92" class="title">Folder structure</text>
  <text x="92" y="120" class="text">Only the important parts. Everything else follows standard Android project layout.</text>

  <g transform="translate(104 178)">
    <circle cx="8" cy="8" r="8" class="accent"/>
    <text x="30" y="14" class="path">/</text>
    <text x="56" y="14" class="muted">repo root</text>

    <path d="M8 28 V70 H56" class="line"/>
    <path d="M8 28 V118 H56" class="line"/>
    <path d="M8 28 V166 H56" class="line"/>
    <path d="M8 28 V214 H56" class="line"/>
    <path d="M8 28 V262 H56" class="line"/>

    <text x="76" y="74" class="path">app/</text>
    <text x="136" y="74" class="muted">application module</text>
    <path d="M136 90 V136 H176" class="line"/>
    <path d="M136 90 V184 H176" class="line"/>
    <path d="M136 90 V232 H176" class="line"/>
    <path d="M136 90 V280 H176" class="line"/>

    <text x="198" y="140" class="path">src/main/java/com/example/</text>
    <text x="198" y="188" class="path">src/main/res/</text>
    <text x="198" y="236" class="path">src/test/</text>
    <text x="198" y="284" class="path">src/androidTest/</text>

    <path d="M198 128 V334 H240" class="line"/>
    <path d="M198 128 V382 H240" class="line"/>
    <path d="M198 128 V430 H240" class="line"/>

    <text x="262" y="338" class="path">MainActivity.kt</text>
    <text x="262" y="386" class="path">data/</text>
    <text x="262" y="434" class="path">ui/</text>

    <path d="M262 370 V482 H304" class="line"/>
    <path d="M262 418 V530 H304" class="line"/>

    <text x="326" y="486" class="path">AppDatabase.kt</text>
    <text x="326" y="534" class="path">AppRepository.kt</text>
    <text x="326" y="582" class="path">Daos.kt</text>
    <text x="326" y="630" class="path">Models.kt</text>

    <path d="M262 418 V678 H304" class="line"/>
    <path d="M262 418 V726 H304" class="line"/>

    <text x="326" y="682" class="path">MainViewModel.kt</text>
    <text x="326" y="730" class="path">components/GlassComponents.kt</text>
  </g>

  <g transform="translate(1000 178)">
    <circle cx="8" cy="8" r="8" class="gold"/>
    <text x="30" y="14" class="path">support files</text>
    <text x="30" y="48" class="muted">build, metadata, and config</text>
    <text x="30" y="96" class="path">build.gradle.kts</text>
    <text x="30" y="132" class="path">settings.gradle.kts</text>
    <text x="30" y="168" class="path">gradle/libs.versions.toml</text>
    <text x="30" y="204" class="path">.env.example</text>
    <text x="30" y="240" class="path">metadata.json</text>
    <text x="30" y="276" class="path">README.md</text>
    <text x="30" y="312" class="path">LICENSE</text>
