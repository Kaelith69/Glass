<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">CineCommon banner</title>
  <desc id="desc">Dark cinematic banner with the CineCommon title and palette accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="55%" stop-color="#1a1a1d"/>
      <stop offset="100%" stop-color="#0c0c0e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>
  <rect width="1600" height="520" fill="url(#bg)"/>
  <circle cx="250" cy="120" r="120" fill="#e53935" opacity=".16" filter="url(#blur)"/>
  <circle cx="1360" cy="390" r="180" fill="#fbbf24" opacity=".10" filter="url(#blur)"/>
  <rect x="96" y="86" width="1408" height="348" rx="36" fill="#ffffff" opacity=".03" stroke="#ffffff" stroke-opacity=".07"/>
  <rect x="120" y="118" width="8" height="284" rx="4" fill="url(#accent)"/>
  <rect x="1472" y="118" width="8" height="284" rx="4" fill="url(#accent)" opacity=".8"/>
  <g opacity=".12" fill="#fff">
    <rect x="160" y="130" width="18" height="260" rx="9"/>
    <rect x="196" y="130" width="18" height="260" rx="9"/>
    <rect x="232" y="130" width="18" height="260" rx="9"/>
  </g>
  <text x="250" y="210" fill="#fafafa" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="92" font-weight="800" letter-spacing="-2">CineCommon</text>
  <text x="252" y="268" fill="#a1a1aa" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="500">
    Local-first Android movie curation, with just enough governance to be interesting.
  </text>
  <g transform="translate(252 320)">
    <rect width="118" height="38" rx="19" fill="#e53935" opacity=".16"/>
    <text x="59" y="25" fill="#e53935" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Compose</text>
    <rect x="132" width="84" height="38" rx="19" fill="#fbbf24" opacity=".16"/>
    <text x="174" y="25" fill="#fbbf24" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Room</text>
    <rect x="228" width="118" height="38" rx="19" fill="#ffffff" opacity=".08"/>
    <text x="287" y="25" fill="#fafafa" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">StateFlow</text>
  </g>
  <text x="1350" y="210" fill="#fafafa" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" opacity=".9">single-activity</text>
  <text x="1350" y="242" fill="#a1a1aa" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">community movie ledger</text>
  <text x="1350" y="274" fill="#a1a1aa" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">trust scores included, because apparently everything needs governance now</text>
</svg>

