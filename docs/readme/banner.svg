<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-labelledby="title desc">
  <title id="title">CineCommon banner</title>
  <desc id="desc">Clean dark banner with the app name and core platform highlights.</desc>
  <defs>
    <style>
      .bg { fill: #0b0b0d; }
      .panel { fill: #17171b; stroke: rgba(255,255,255,.08); stroke-width: 1.5; }
      .title { fill: #f4f4f5; font: 800 88px Inter, Segoe UI, Arial, sans-serif; letter-spacing: -2px; }
      .text { fill: #a1a1aa; font: 500 24px Inter, Segoe UI, Arial, sans-serif; }
      .chip { fill: #222228; }
      .chipText { fill: #f4f4f5; font: 700 16px Inter, Segoe UI, Arial, sans-serif; }
      .accent { fill: #ef4444; }
      .gold { fill: #fbbf24; }
    </style>
  </defs>
  <rect width="1600" height="420" class="bg"/>
  <rect x="64" y="56" width="1472" height="308" rx="28" class="panel"/>
  <rect x="96" y="90" width="6" height="240" rx="3" class="accent"/>
  <text x="140" y="190" class="title">CineCommon</text>
  <text x="140" y="242" class="text">Local-first Android movie curation with Compose, Room, and StateFlow.</text>
  <g transform="translate(140 274)">
    <rect width="122" height="36" rx="18" class="chip"/>
    <text x="61" y="24" text-anchor="middle" class="chipText">Compose</text>
    <rect x="136" width="86" height="36" rx="18" class="chip"/>
    <text x="179" y="24" text-anchor="middle" class="chipText">Room</text>
    <rect x="234" width="116" height="36" rx="18" class="chip"/>
    <text x="292" y="24" text-anchor="middle" class="chipText">StateFlow</text>
    <rect x="362" width="144" height="36" rx="18" class="chip"/>
    <text x="434" y="24" text-anchor="middle" class="chipText">Trust rules</text>
  </g>
  <text x="1456" y="180" fill="#f4f4f5" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">single activity</text>
  <text x="1456" y="214" fill="#a1a1aa" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">local persistence</text>
  <text x="1456" y="244" fill="#a1a1aa" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">community movie ledger</text>
  <circle cx="1368" cy="280" r="48" fill="#ef4444" opacity=".16"/>
  <circle cx="1448" cy="280" r="24" fill="#fbbf24" opacity=".22"/>
</svg>
